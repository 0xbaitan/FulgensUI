name: Enforce Single Estimate Label

on:
  issues:
    types: [labeled, reopened]

permissions:
  issues: write

jobs:
  enforce-single-estimate:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce Single Estimate Label
        uses: actions/github-script@v7
        with:
          script: |
            // === LABEL CONFIG (generated from .github/labels.yml) ===
            // Run: node .github/scripts/inject-labels.js
            // Last updated: 2026-03-04
            const STATUS_LABELS = ["status:backlog", "status:ready", "status:development", "status:review", "status:qa", "status:defect", "status:done"];
            const PRIORITY_LABELS = ["priority:must-have", "priority:should-have", "priority:could-have", "priority:won't-have"];
            const TYPE_LABELS = ["type:feat", "type:fix", "type:docs", "type:refactor", "type:perf", "type:build", "type:test", "type:ci", "type:revert", "type:chore", "type:style"];
            const ESTIMATE_LABELS = ["estimate:1", "estimate:2", "estimate:3", "estimate:5", "estimate:8", "estimate:13", "estimate:21", "estimate:34", "estimate:55", "estimate:89"];
            const TRANSITION_RULES = {
              "status:backlog": [
                "status:ready",
                "status:development",
                "status:defect"
              ],
              "status:ready": [
                "status:development",
                "status:backlog"
              ],
              "status:development": [
                "status:review",
                "status:qa",
                "status:defect",
                "status:backlog"
              ],
              "status:review": [
                "status:qa",
                "status:development",
                "status:defect"
              ],
              "status:qa": [
                "status:done",
                "status:defect",
                "status:development",
                "status:backlog"
              ],
              "status:defect": [
                "status:development",
                "status:backlog"
              ],
              "status:done": [
                "status:backlog",
                "status:ready",
                "status:development",
                "status:review",
                "status:qa",
                "status:defect"
              ]
            };
            // === END LABEL CONFIG ===

            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get current labels
            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number
            });

            const labels = issue.labels.map(l => l.name);
            console.log(`Current labels: ${labels.join(', ')}`);

            // Find all estimate labels on the issue
            const currentEstimateLabels = labels.filter(l => ESTIMATE_LABELS.includes(l));
            console.log(`Estimate labels found: ${currentEstimateLabels.join(', ')}`);

            const triggeredLabel = context.payload.label?.name;
            console.log(`Triggered by label: ${triggeredLabel}`);

            // Handle estimate label enforcement
            if (currentEstimateLabels.length > 1) {
              console.log('Multiple estimate labels detected. Enforcing mutual exclusion...');
              
              let labelToKeep;
              if (triggeredLabel && ESTIMATE_LABELS.includes(triggeredLabel)) {
                labelToKeep = triggeredLabel;
              } else {
                labelToKeep = currentEstimateLabels[0];
              }
              
              const labelsToRemove = currentEstimateLabels.filter(l => l !== labelToKeep);
              
              for (const label of labelsToRemove) {
                console.log(`Removing estimate label: ${label}`);
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number,
                    name: label
                  });
                } catch (error) {
                  console.error(`Failed to remove label ${label}:`, error.message);
                }
              }
              
              const comment = `🏷️ **Estimate Label Enforcement**\n\n` +
                `Only one estimate label is allowed per issue.\n\n` +
                `✅ **Kept:** \`${labelToKeep}\`\n` +
                `❌ **Removed:** ${labelsToRemove.map(l => `\`${l}\``).join(', ')}\n\n` +
                `💡 **Tip:** Estimates use Fibonacci sequence (1, 2, 3, 5, 8...). Change anytime - old estimates are automatically removed.`;
              
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: comment
              });
              
              console.log('Estimate label enforcement complete.');
            } else {
              console.log('No estimate label conflicts detected.');
            }
