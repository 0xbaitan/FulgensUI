name: Enforce Single Type Label

# Ensures each issue has only ONE type label
# Type labels: type:feat, type:fix, type:docs, type:refactor, type:perf, type:build,
#              type:test, type:ci, type:revert, type:chore, type:style
# No transition validation (any-to-any allowed)
# Note: issue:* labels (bug, story, epic, task, item) are separate and NOT mutually exclusive with type labels

on:
  issues:
    types: [labeled, reopened]

permissions:
  issues: write

jobs:
  enforce-single-type:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce Single Type Label
        uses: actions/github-script@v7
        with:
          script: |
            // === LABEL CONFIG (generated from .github/labels.yml) ===
            // Run: node .github/scripts/inject-labels.js
            // Last updated: 2026-03-04
            const STATUS_LABELS = ["status:backlog", "status:ready", "status:development", "status:review", "status:qa", "status:defect", "status:done"];
            const PRIORITY_LABELS = ["priority:must-have", "priority:should-have", "priority:could-have", "priority:won't-have"];
            const TYPE_LABELS = ["type:feat", "type:fix", "type:docs", "type:refactor", "type:perf", "type:build", "type:test", "type:ci", "type:revert", "type:chore", "type:style"];
            const ESTIMATE_LABELS = ["estimate:1", "estimate:2", "estimate:3", "estimate:5", "estimate:8", "estimate:13", "estimate:21", "estimate:34", "estimate:55", "estimate:89"];
            const TRANSITION_RULES = {
              "status:backlog": [
                "status:ready",
                "status:development",
                "status:defect"
              ],
              "status:ready": [
                "status:development",
                "status:backlog"
              ],
              "status:development": [
                "status:review",
                "status:qa",
                "status:defect",
                "status:backlog"
              ],
              "status:review": [
                "status:qa",
                "status:development",
                "status:defect"
              ],
              "status:qa": [
                "status:done",
                "status:defect",
                "status:development",
                "status:backlog"
              ],
              "status:defect": [
                "status:development",
                "status:backlog"
              ],
              "status:done": [
                "status:backlog",
                "status:ready",
                "status:development",
                "status:review",
                "status:qa",
                "status:defect"
              ]
            };
            // === END LABEL CONFIG ===

            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get current labels
            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number
            });

            const labels = issue.labels.map(l => l.name);
            console.log(`Current labels: ${labels.join(', ')}`);

            // Find all type labels on the issue
            const currentTypeLabels = labels.filter(l => TYPE_LABELS.includes(l));
            console.log(`Type labels found: ${currentTypeLabels.join(', ')}`);

            // If multiple type labels exist, keep only the most recently added one
            if (currentTypeLabels.length > 1) {
              console.log('Multiple type labels detected. Enforcing mutual exclusion...');
              
              // Determine which label was just added (from the labeled event)
              const triggeredLabel = context.payload.label?.name;
              console.log(`Triggered by label: ${triggeredLabel}`);
              
              let labelToKeep;
              if (triggeredLabel && TYPE_LABELS.includes(triggeredLabel)) {
                // Keep the newly added label
                labelToKeep = triggeredLabel;
              } else {
                // Fallback: Keep the first type label (shouldn't happen in normal flow)
                labelToKeep = currentTypeLabels[0];
              }
              
              // Remove all type labels except the one to keep
              const labelsToRemove = currentTypeLabels.filter(l => l !== labelToKeep);
              
              for (const label of labelsToRemove) {
                console.log(`Removing label: ${label}`);
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number,
                    name: label
                  });
                } catch (error) {
                  console.error(`Failed to remove label ${label}:`, error.message);
                }
              }
              
              // Add informative comment
              const comment = `🏷️ **Type Label Enforcement**\n\n` +
                `Only one type label is allowed per issue.\n\n` +
                `✅ **Kept:** \`${labelToKeep}\`\n` +
                `❌ **Removed:** ${labelsToRemove.map(l => `\`${l}\``).join(', ')}\n\n` +
                `💡 **Tip:** Type labels follow Conventional Commits. Change them anytime - old labels are automatically removed.`;
              
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: comment
              });
              
              console.log('Type label enforcement complete.');
            } else {
              console.log('No type label conflicts detected.');
            }
