name: Auto-Inject Labels into Workflows

on:
  push:
    branches:
      - main
    paths:
      - ".github/labels.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  inject-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd .github/scripts
          npm install

      - name: Generate new label config
        id: generate
        run: |
          cd .github/scripts
          node inject-labels.js > /tmp/label-config.js
          echo "Generated label config:"
          cat /tmp/label-config.js

      - name: Update workflows with new label config
        run: |
          # Read generated config
          NEW_CONFIG=$(cat /tmp/label-config.js)

          # Define workflows to update
          WORKFLOWS=(
            "enforce-single-status.yml"
            "enforce-single-priority.yml"
            "enforce-single-estimate.yml"
            "enforce-single-type.yml"
            "auto-label-new-issues.yml"
            "auto-apply-template-labels.yml"
            "auto-reopen-backlog.yml"
            "cleanup-labels.yml"
          )

          # Update each workflow
          for workflow in "${WORKFLOWS[@]}"; do
            FILE=".github/workflows/$workflow"
            if [ -f "$FILE" ]; then
              echo "Updating $workflow..."

              # Use sed to replace content between markers
              sed -i "/=== LABEL CONFIG/,/=== END LABEL CONFIG ===/c\\
          $NEW_CONFIG" "$FILE"

              echo "✅ Updated $workflow"
            else
              echo "⚠️  File not found: $FILE"
            fi
          done

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --name-only
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore(ci): auto-inject updated labels from labels.yml"
          title: "chore(ci): Auto-inject updated labels"
          body: |
            ## 🤖 Automated Label Injection

            This PR was automatically generated because `.github/labels.yml` was updated.

            ### Changes
            - Updated label arrays in all enforcement workflows
            - Updated transition rules in status enforcement
            - Synchronized with centralized label configuration

            ### Affected Workflows
            - enforce-single-status.yml
            - enforce-single-priority.yml
            - enforce-single-estimate.yml
            - enforce-single-type.yml
            - auto-label-new-issues.yml
            - auto-apply-template-labels.yml
            - auto-reopen-backlog.yml
            - cleanup-labels.yml

            **Please review and merge if changes look correct.**

            ---

            Generated by: `.github/workflows/auto-inject-labels.yml`
          branch: auto-inject-labels
          delete-branch: true
          labels: "type:ci\npriority:should-have"
