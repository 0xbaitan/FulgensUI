name: Enforce Single Status Label

on:
  issues:
    types: [labeled, reopened]

permissions:
  issues: write

jobs:
  enforce-single-status:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce Single Status Label
        uses: actions/github-script@v7
        with:
          script: |
            // === LABEL CONFIG (generated from .github/labels.yml) ===
            // Run: node .github/scripts/inject-labels.js
            // Last updated: 2026-03-04
            const STATUS_LABELS = ["status:backlog", "status:ready", "status:development", "status:review", "status:qa", "status:defect", "status:done"];
            const PRIORITY_LABELS = ["priority:must-have", "priority:should-have", "priority:could-have", "priority:won't-have"];
            const TYPE_LABELS = ["type:feat", "type:fix", "type:docs", "type:refactor", "type:perf", "type:build", "type:test", "type:ci", "type:revert", "type:chore", "type:style"];
            const ESTIMATE_LABELS = ["estimate:1", "estimate:2", "estimate:3", "estimate:5", "estimate:8", "estimate:13", "estimate:21", "estimate:34", "estimate:55", "estimate:89"];
            const TRANSITION_RULES = {
              "status:backlog": [
                "status:ready",
                "status:development",
                "status:defect"
              ],
              "status:ready": [
                "status:development",
                "status:backlog"
              ],
              "status:development": [
                "status:review",
                "status:qa",
                "status:defect",
                "status:backlog"
              ],
              "status:review": [
                "status:qa",
                "status:development",
                "status:defect"
              ],
              "status:qa": [
                "status:done",
                "status:defect",
                "status:development",
                "status:backlog"
              ],
              "status:defect": [
                "status:development",
                "status:backlog"
              ],
              "status:done": [
                "status:backlog",
                "status:ready",
                "status:development",
                "status:review",
                "status:qa",
                "status:defect"
              ]
            };
            // === END LABEL CONFIG ===

            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log(`Processing issue #${issue_number}...`);

            // Get current labels
            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number
            });

            const labels = issue.labels.map(l => l.name);
            console.log(`Current labels: ${labels.join(', ')}`);

            // Find all status labels
            const currentStatusLabels = labels.filter(l => STATUS_LABELS.includes(l));
            console.log(`Status labels found: ${currentStatusLabels.join(', ')}`);

            if (currentStatusLabels.length === 0) {
              console.log('No status labels found. Nothing to enforce.');
              return;
            }

            // Determine which label was just added
            const triggeredLabel = context.payload.label?.name;
            console.log(`Triggered by label: ${triggeredLabel || '(reopened event)'}`);

            if (currentStatusLabels.length === 1) {
              console.log('Only one status label present. No conflicts.');
              return;
            }

            // Multiple status labels detected
            console.log('⚠️ Multiple status labels detected. Enforcing mutual exclusion...');

            // Determine label to keep
            let labelToKeep;
            if (triggeredLabel && STATUS_LABELS.includes(triggeredLabel)) {
              labelToKeep = triggeredLabel;
            } else {
              // Fallback: keep first one (shouldn't happen normally)
              labelToKeep = currentStatusLabels[0];
            }

            const oldLabel = currentStatusLabels.find(l => l !== labelToKeep);

            // Validate transition if we have both old and new
            if (oldLabel && labelToKeep !== oldLabel) {
              console.log(`Validating transition: ${oldLabel} → ${labelToKeep}`);
              
              const validNextStates = TRANSITION_RULES[oldLabel] || [];
              const isValidTransition = validNextStates.includes(labelToKeep);
              
              if (!isValidTransition) {
                console.log(`❌ Invalid transition from ${oldLabel} to ${labelToKeep}`);
                console.log(`Valid next states: ${validNextStates.join(', ')}`);
                
                // Remove the invalid new label
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number,
                    name: labelToKeep
                  });
                  console.log(`Removed invalid label: ${labelToKeep}`);
                } catch (error) {
                  console.error(`Failed to remove label ${labelToKeep}:`, error.message);
                }
                
                // Post error comment
                const oldName = oldLabel.replace('status:', '');
                const newName = labelToKeep.replace('status:', '');
                const validNames = validNextStates.map(s => s.replace('status:', '')).join(', ');
                
                const comment = `❌ **Invalid Status Transition**\n\n` +
                  `Cannot transition from \`${oldName}\` → \`${newName}\`\n\n` +
                  `**Valid next states from \`${oldName}\`:** ${validNames}\n\n` +
                  `💡 **Tip:** Follow the workflow path. See [TRANSITION-RULES.md](https://github.com/${owner}/${repo}/blob/main/.github/workflows/TRANSITION-RULES.md) for the complete state machine.`;
                
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body: comment
                });
                
                console.log('✅ Invalid transition blocked.');
                return;
              }
              
              console.log('✅ Transition is valid.');
            }

            // Valid transition or no old label - remove old labels
            const labelsToRemove = currentStatusLabels.filter(l => l !== labelToKeep);

            for (const label of labelsToRemove) {
              console.log(`Removing old label: ${label}`);
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name: label
                });
              } catch (error) {
                console.error(`Failed to remove label ${label}:`, error.message);
              }
            }

            // Post success comment
            const comment = `🏷️ **Status Label Updated**\n\n` +
              `✅ **Current status:** \`${labelToKeep.replace('status:', '')}\`\n` +
              `❌ **Removed:** ${labelsToRemove.map(l => `\`${l.replace('status:', '')}\``).join(', ')}\n\n` +
              `💡 **Tip:** Status labels are mutually exclusive. Adding a new status automatically removes the old one.`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: comment
            });

            console.log('✅ Status label enforcement complete.');
