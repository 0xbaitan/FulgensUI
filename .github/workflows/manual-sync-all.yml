name: Manual Full Sync (Labels ↔ Project)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview changes without applying)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      direction:
        description: "Sync direction"
        required: true
        default: "both"
        type: choice
        options:
          - "both"
          - "labels-to-project"
          - "project-to-labels"

permissions:
  issues: write
  repository-projects: write
  contents: read

env:
  PROJECT_NUMBER: 9
  PROJECT_OWNER: "0xbaitan"
  REPO_OWNER: "0xbaitan"
  REPO_NAME: "FulgensUI"
  STATUS_FIELD_ID: "PVTSSF_lAHOAeQxRM4BQVimzg-fIIo"

jobs:
  manual-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Display sync configuration
        run: |
          echo "=== Manual Full Sync Configuration ==="
          echo "Dry run: ${{ github.event.inputs.dry_run }}"
          echo "Direction: ${{ github.event.inputs.direction }}"
          echo "Project: #${{ env.PROJECT_NUMBER }}"
          echo "Repository: ${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}"
          echo ""

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "🔍 DRY RUN MODE - No changes will be applied"
          else
            echo "✍️ LIVE MODE - Changes will be applied"
          fi

      - name: Get all project items
        id: get-items
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all items from project #${{ env.PROJECT_NUMBER }}"

          QUERY=$(cat <<'EOF'
          query($owner: String!, $projectNumber: Int!) {
            user(login: $owner) {
              projectV2(number: $projectNumber) {
                id
                items(first: 100) {
                  nodes {
                    id
                    content {
                      ... on Issue {
                        id
                        number
                        repository {
                          nameWithOwner
                        }
                        labels(first: 50) {
                          nodes {
                            name
                          }
                        }
                      }
                    }
                    fieldValueByName(name: "Status") {
                      ... on ProjectV2ItemFieldSingleSelectValue {
                        name
                        optionId
                      }
                    }
                  }
                }
              }
            }
          }
          EOF
          )

          RESPONSE=$(gh api graphql \
            -f query="$QUERY" \
            -f owner="${{ env.PROJECT_OWNER }}" \
            -F projectNumber=${{ env.PROJECT_NUMBER }})

          if echo "$RESPONSE" | jq -e '.errors' > /dev/null; then
            echo "Error fetching project items:"
            echo "$RESPONSE" | jq '.errors'
            exit 1
          fi

          echo "$RESPONSE" > /tmp/project_items.json

          ITEM_COUNT=$(echo "$RESPONSE" | jq '.data.user.projectV2.items.nodes | length')
          echo "Found $ITEM_COUNT items in project"
          echo "item_count=$ITEM_COUNT" >> $GITHUB_OUTPUT

          PROJECT_ID=$(echo "$RESPONSE" | jq -r '.data.user.projectV2.id')
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT

      - name: Sync project-to-labels
        if: github.event.inputs.direction == 'project-to-labels' || github.event.inputs.direction == 'both'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ""
          echo "=== Phase 1: Syncing Project Status → Labels ==="
          echo ""

          DRY_RUN="${{ github.event.inputs.dry_run }}"
          CHANGES_PLANNED=0

          ITEMS=$(cat /tmp/project_items.json | jq -c '.data.user.projectV2.items.nodes[]')

          while IFS= read -r item; do
            ISSUE_NUMBER=$(echo "$item" | jq -r '.content.number // empty')
            REPO_FULL=$(echo "$item" | jq -r '.content.repository.nameWithOwner // empty')
            STATUS_NAME=$(echo "$item" | jq -r '.fieldValueByName.name // empty')
            
            if [ -z "$ISSUE_NUMBER" ] || [ "$ISSUE_NUMBER" = "null" ]; then
              continue
            fi
            
            if [ "$REPO_FULL" != "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}" ]; then
              continue
            fi
            
            CURRENT_LABELS=$(echo "$item" | jq -r '.content.labels.nodes[].name')
            CURRENT_STATUS_LABEL=$(echo "$CURRENT_LABELS" | grep '^status:' || echo "")
            
            case "$STATUS_NAME" in
              "Backlog") EXPECTED_LABEL="status:backlog" ;;
              "Ready") EXPECTED_LABEL="status:ready" ;;
              "Development") EXPECTED_LABEL="status:development" ;;
              "Review") EXPECTED_LABEL="status:review" ;;
              "QA") EXPECTED_LABEL="status:qa" ;;
              "Defect") EXPECTED_LABEL="status:defect" ;;
              "Done") EXPECTED_LABEL="status:done" ;;
              "") EXPECTED_LABEL="" ;;
              *) continue ;;
            esac
            
            if [ "$CURRENT_STATUS_LABEL" = "$EXPECTED_LABEL" ]; then
              continue
            fi
            
            echo "Issue #$ISSUE_NUMBER: '$CURRENT_STATUS_LABEL' → '$EXPECTED_LABEL'"
            CHANGES_PLANNED=$((CHANGES_PLANNED + 1))
            
            if [ "$DRY_RUN" = "false" ]; then
              if [ -n "$CURRENT_STATUS_LABEL" ]; then
                ENCODED_LABEL=$(echo "$CURRENT_STATUS_LABEL" | jq -sRr @uri)
                gh api --method DELETE \
                  "/repos/${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}/issues/$ISSUE_NUMBER/labels/$ENCODED_LABEL" \
                  2>/dev/null || true
              fi
              
              if [ -n "$EXPECTED_LABEL" ]; then
                gh api --method POST \
                  "/repos/${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}/issues/$ISSUE_NUMBER/labels" \
                  -f labels[]="$EXPECTED_LABEL" \
                  2>/dev/null || true
              fi
              
              echo "  ✅ Applied"
            else
              echo "  🔍 Would apply (dry run)"
            fi
            
          done <<< "$ITEMS"

          echo ""
          echo "Project→Labels: $CHANGES_PLANNED changes $([ "$DRY_RUN" = "true" ] && echo "planned" || echo "applied")"

      - name: Sync labels-to-project
        if: github.event.inputs.direction == 'labels-to-project' || github.event.inputs.direction == 'both'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ""
          echo "=== Phase 2: Syncing Labels → Project Status ==="
          echo ""

          DRY_RUN="${{ github.event.inputs.dry_run }}"
          PROJECT_ID="${{ steps.get-items.outputs.project_id }}"
          CHANGES_PLANNED=0

          ITEMS=$(cat /tmp/project_items.json | jq -c '.data.user.projectV2.items.nodes[]')

          while IFS= read -r item; do
            ISSUE_NUMBER=$(echo "$item" | jq -r '.content.number // empty')
            REPO_FULL=$(echo "$item" | jq -r '.content.repository.nameWithOwner // empty')
            ITEM_ID=$(echo "$item" | jq -r '.id')
            CURRENT_STATUS=$(echo "$item" | jq -r '.fieldValueByName.name // empty')
            
            if [ -z "$ISSUE_NUMBER" ] || [ "$ISSUE_NUMBER" = "null" ]; then
              continue
            fi
            
            if [ "$REPO_FULL" != "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}" ]; then
              continue
            fi
            
            CURRENT_LABELS=$(echo "$item" | jq -r '.content.labels.nodes[].name')
            STATUS_LABEL=$(echo "$CURRENT_LABELS" | grep '^status:' || echo "")
            
            if [ -z "$STATUS_LABEL" ]; then
              continue
            fi
            
            # Map label to expected Status field value
            case "$STATUS_LABEL" in
              "status:backlog") EXPECTED_STATUS="Backlog"; OPTION_ID="8b99bfa8" ;;
              "status:ready") EXPECTED_STATUS="Ready"; OPTION_ID="f75ad846" ;;
              "status:development") EXPECTED_STATUS="Development"; OPTION_ID="47fc9ee4" ;;
              "status:review") EXPECTED_STATUS="Review"; OPTION_ID="c5e8bce6" ;;
              "status:qa") EXPECTED_STATUS="QA"; OPTION_ID="33f744ff" ;;
              "status:defect") EXPECTED_STATUS="Defect"; OPTION_ID="9b5ee227" ;;
              "status:done") EXPECTED_STATUS="Done"; OPTION_ID="98236657" ;;
              *) continue ;;
            esac
            
            if [ "$CURRENT_STATUS" = "$EXPECTED_STATUS" ]; then
              continue
            fi
            
            echo "Issue #$ISSUE_NUMBER: '$CURRENT_STATUS' → '$EXPECTED_STATUS' (from label: $STATUS_LABEL)"
            CHANGES_PLANNED=$((CHANGES_PLANNED + 1))
            
            if [ "$DRY_RUN" = "false" ]; then
              MUTATION=$(cat <<'EOF'
          mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
            updateProjectV2ItemFieldValue(
              input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }
            ) {
              projectV2Item { id }
            }
          }
          EOF
              )
              
              RESPONSE=$(gh api graphql \
                -f query="$MUTATION" \
                -f projectId="$PROJECT_ID" \
                -f itemId="$ITEM_ID" \
                -f fieldId="${{ env.STATUS_FIELD_ID }}" \
                -f optionId="$OPTION_ID" 2>/dev/null || echo '{"errors":[]}')
              
              if echo "$RESPONSE" | jq -e '.errors' > /dev/null 2>&1; then
                echo "  ⚠️ Failed to update"
              else
                echo "  ✅ Applied"
              fi
            else
              echo "  🔍 Would apply (dry run)"
            fi
            
          done <<< "$ITEMS"

          echo ""
          echo "Labels→Project: $CHANGES_PLANNED changes $([ "$DRY_RUN" = "true" ] && echo "planned" || echo "applied")"

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "=== Manual Full Sync Complete ==="
          echo "Mode: $([ "${{ github.event.inputs.dry_run }}" = "true" ] && echo "DRY RUN" || echo "LIVE")"
          echo "Direction: ${{ github.event.inputs.direction }}"
          echo "Status: ${{ job.status }}"
          echo ""
          echo "💡 Tip: Run with dry_run=true first to preview changes"
