name: Enforce Single Priority Label

# Ensures each issue has only ONE priority label
# Priority labels: priority:must-have, priority:should-have, priority:could-have, priority:won't-have
# No transition validation (any-to-any allowed)

on:
  issues:
    types: [labeled, reopened]

permissions:
  issues: write

jobs:
  enforce-single-priority:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce Single Priority Label
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get current labels
            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number
            });

            const labels = issue.labels.map(l => l.name);
            console.log(`Current labels: ${labels.join(', ')}`);

            // Define priority labels
            const priorityLabels = [
              'priority:must-have',
              'priority:should-have',
              'priority:could-have',
              'priority:won\'t-have'
            ];

            // Find all priority labels on the issue
            const currentPriorityLabels = labels.filter(l => priorityLabels.includes(l));
            console.log(`Priority labels found: ${currentPriorityLabels.join(', ')}`);

            // If multiple priority labels exist, keep only the most recently added one
            if (currentPriorityLabels.length > 1) {
              console.log('Multiple priority labels detected. Enforcing mutual exclusion...');
              
              // Determine which label was just added (from the labeled event)
              const triggeredLabel = context.payload.label?.name;
              console.log(`Triggered by label: ${triggeredLabel}`);
              
              let labelToKeep;
              if (triggeredLabel && priorityLabels.includes(triggeredLabel)) {
                // Keep the newly added label
                labelToKeep = triggeredLabel;
              } else {
                // Fallback: Keep the first priority label (shouldn't happen in normal flow)
                labelToKeep = currentPriorityLabels[0];
              }
              
              // Remove all priority labels except the one to keep
              const labelsToRemove = currentPriorityLabels.filter(l => l !== labelToKeep);
              
              for (const label of labelsToRemove) {
                console.log(`Removing label: ${label}`);
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number,
                    name: label
                  });
                } catch (error) {
                  console.error(`Failed to remove label ${label}:`, error.message);
                }
              }
              
              // Add informative comment
              const comment = `🏷️ **Priority Label Enforcement**\n\n` +
                `Only one priority label is allowed per issue.\n\n` +
                `✅ Kept: \`${labelToKeep}\`\n` +
                `❌ Removed: ${labelsToRemove.map(l => `\`${l}\``).join(', ')}\n\n` +
                `*Priority labels: must-have, should-have, could-have, won't-have*`;
              
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: comment
              });
              
              console.log('Priority label enforcement complete.');
            } else {
              console.log('No priority label conflicts detected.');
            }
