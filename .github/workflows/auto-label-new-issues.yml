name: Auto-Label New Issues

# Automatically adds status:backlog to newly created issues
# This ensures every issue starts in the backlog and enters the workflow

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-label-backlog:
    runs-on: ubuntu-latest
    steps:
      - name: Add Backlog Label
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log(`New issue #${issue_number} created. Adding status:backlog label...`);

            // Get current labels to check if status:backlog already exists
            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number
            });

            const labels = issue.labels.map(l => l.name);
            console.log(`Current labels: ${labels.join(', ')}`);

            // Check if any status label already exists
            const statusLabels = [
              'status:backlog',
              'status:ready',
              'status:development',
              'status:review',
              'status:qa',
              'status:defect',
              'status:done'
            ];

            const hasStatusLabel = labels.some(l => statusLabels.includes(l));

            if (hasStatusLabel) {
              console.log('Issue already has a status label. Skipping auto-label.');
            } else {
              // Add status:backlog
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['status:backlog']
              });
              
              console.log('✅ Added status:backlog label to new issue.');
            }
