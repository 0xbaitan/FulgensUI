name: Auto-Label New Issues

# Automatically adds status:backlog to newly created issues
# This ensures every issue starts in the backlog and enters the workflow

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-label-backlog:
    runs-on: ubuntu-latest
    steps:
      - name: Add Backlog Label
        uses: actions/github-script@v7
        with:
          script: |
            // === LABEL CONFIG (generated from .github/labels.yml) ===
            // Run: node .github/scripts/inject-labels.js
            // Last updated: 2026-03-04
            const STATUS_LABELS = ["status:backlog", "status:ready", "status:development", "status:review", "status:qa", "status:defect", "status:done"];
            const PRIORITY_LABELS = ["priority:must-have", "priority:should-have", "priority:could-have", "priority:won't-have"];
            const TYPE_LABELS = ["type:feat", "type:fix", "type:docs", "type:refactor", "type:perf", "type:build", "type:test", "type:ci", "type:revert", "type:chore", "type:style"];
            const ESTIMATE_LABELS = ["estimate:1", "estimate:2", "estimate:3", "estimate:5", "estimate:8", "estimate:13", "estimate:21", "estimate:34", "estimate:55", "estimate:89"];
            const TRANSITION_RULES = {
              "status:backlog": [
                "status:ready",
                "status:development",
                "status:defect"
              ],
              "status:ready": [
                "status:development",
                "status:backlog"
              ],
              "status:development": [
                "status:review",
                "status:qa",
                "status:defect",
                "status:backlog"
              ],
              "status:review": [
                "status:qa",
                "status:development",
                "status:defect"
              ],
              "status:qa": [
                "status:done",
                "status:defect",
                "status:development",
                "status:backlog"
              ],
              "status:defect": [
                "status:development",
                "status:backlog"
              ],
              "status:done": [
                "status:backlog",
                "status:ready",
                "status:development",
                "status:review",
                "status:qa",
                "status:defect"
              ]
            };
            // === END LABEL CONFIG ===

            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log(`New issue #${issue_number} created. Adding status:backlog label...`);

            // Get current labels to check if status:backlog already exists
            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number
            });

            const labels = issue.labels.map(l => l.name);
            console.log(`Current labels: ${labels.join(', ')}`);

            // Check if any status label already exists
            const hasStatusLabel = labels.some(l => STATUS_LABELS.includes(l));

            if (hasStatusLabel) {
              console.log('Issue already has a status label. Skipping auto-label.');
            } else {
              // Add status:backlog
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['status:backlog']
              });
              
              console.log('✅ Added status:backlog label to new issue.');
            }
