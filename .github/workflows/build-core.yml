name: Build Core Components

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate PandaCSS
        run: |
          cd packages/core
          npx panda codegen --silent

      - name: Build core components
        run: |
          cd packages/core
          npm run build

      - name: Build Storybook
        run: |
          cd packages/core
          npm run build-storybook

      - name: Upload core dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-dist
          path: packages/core/dist/
          retention-days: 30

      - name: Upload Storybook as artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: packages/core/storybook-static/
          retention-days: 30
