name: Build Core Components

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate commit messages
        run: bunx --bun commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  build:
    runs-on: ubuntu-latest
    needs: [commitlint]
    if: always() && (needs.commitlint.result == 'success' || needs.commitlint.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate PandaCSS
        run: bun run ci:panda

      - name: Lint code
        run: bun run ci:lint

      - name: Type check
        run: bun run ci:type-check

      - name: Run tests with coverage
        run: bun run ci:test:coverage

      - name: Build core components
        run: cd packages/core && bun run build

      - name: Upload core dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-dist
          path: packages/core/dist/
          retention-days: 30

  build-storybook:
    runs-on: ubuntu-latest
    needs: [commitlint]
    if: always() && (needs.commitlint.result == 'success' || needs.commitlint.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate PandaCSS
        run: bun run ci:panda

      - name: Build Storybook
        run: bun run ci:build-storybook

      - name: Upload Storybook as artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: packages/core/storybook-static/
          retention-days: 30
