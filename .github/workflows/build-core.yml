name: Build Core Components

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages
        run: npx --no -- commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate PandaCSS
        run: |
          cd packages/core
          npx panda codegen --silent

      - name: Lint code
        run: |
          cd packages/core
          npm run lint

      - name: Type check
        run: |
          cd packages/core
          npm run type-check

      - name: Run tests
        run: |
          cd packages/core
          npm run test

      - name: Build core components
        run: |
          cd packages/core
          npm run build

      - name: Build Storybook
        run: |
          cd packages/core
          npm run build-storybook

      - name: Upload core dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-dist
          path: packages/core/dist/
          retention-days: 30

      - name: Upload Storybook as artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: packages/core/storybook-static/
          retention-days: 30
